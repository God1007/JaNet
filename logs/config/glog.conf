# WeakNet glog 配置文件
# 当前 Logger::init 不自动读取本文件，而是直接设置部分 FLAGS_*；只有启动器显式解析时这些键才生效。
# 日志级别: INFO, WARNING, ERROR, FATAL
# 0=INFO, 1=WARNING, 2=ERROR, 3=FATAL

# 日志输出到stderr (控制台)
logtostderr=true

# 文件输出模式下同时复制到 stderr；logtostderr=true 时本项不会额外创建日志文件
alsologtostderr=true

# 日志文件目录
log_dir=./logs/server

# 日志文件前缀（留空或删除以使用默认）
# log_prefix=

# 日志文件后缀（可选）
# log_suffix=.log

# 日志文件最大大小 (MB)
max_log_size=10

# 部署侧期望的日志保留数量；当前 Logger::init 不读取或设置此项
max_log_files=5

# 日志级别 (0=INFO, 1=WARNING, 2=ERROR, 3=FATAL)
minloglevel=0

# 是否在日志文件名中包含时间戳；当前 Logger::init 不读取或设置此项
timestamp_in_logfile_name=true

# 添加颜色输出
colorlogtostderr=true

# 是否显示日志前缀（包括文件名和行号）；当前 Logger::init 不读取或设置此项
show_log_prefix=true

